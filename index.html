<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>自家製剤加算 スキルアップクイズ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card" id="info1Screen">
  <p class="badge">説明 1 / 2</p>
  <h2>自家製剤加算について</h2>

  <p class="lead">
    ここに1ページ目の説明文を入力します。<br>
    改行したいところには &lt;br&gt; を入れてください。
  </p>

  <button class="primary" id="info1NextBtn">次へ</button>
</section>

<section class="card hidden" id="info2Screen">
  <p class="badge">説明 2 / 2</p>
  <h2>算定時のポイント</h2>

  <p class="lead">
    ここに2ページ目の説明文を入力します。<br>
    太字にしたい部分は
    <strong>このように書きます。</strong>
  </p>

  <button class="primary" id="info2NextBtn">次へ</button>
</section>
    <section class="card hidden" id="startScreen">
      <p class="badge">自家製剤加算</p>
      <h1>スキルアップクイズ</h1>
      <p class="lead">問題を読んで「算定できる／できない」を選んでください。<br>薬剤名が出てくる問題は、実際に調べてから選んで下さい。</p>
      <button class="primary" id="startBtn">開始する</button>
    </section>

    <section class="card hidden" id="quizScreen">
      <div class="topbar">
        <span id="progress">1 / 10</span>
        <span id="score">正解 0</span>
      </div>
      <h2 id="questionText"></h2>
      <div class="actions">
        <button class="answer yes" data-answer="true">算定できる</button>
        <button class="answer no" data-answer="false">算定できない</button>
      </div>
      <div class="result hidden" id="resultBox">
        <p id="judge"></p>
        <p id="explanation"></p>
        <button class="primary" id="nextBtn">次の問題へ</button>
      </div>
    </section>

    <section class="card hidden" id="finishScreen">
      <p class="badge">結果</p>
      <h2 id="finalScore"></h2>
      <p id="finalMessage"></p>

      <form id="submitForm" class="submit-form">
        <label>
          名前
          <input id="playerName" name="name" type="text" placeholder="例：山田" required />
        </label>

        <label>
          難易度
          <select id="difficulty" name="difficulty" required>
            <option value="">選択してください</option>
            <option value="難しい">難しい</option>
            <option value="普通">普通</option>
            <option value="簡単">簡単</option>
          </select>
        </label>

        <button class="primary" type="submit">結果を送信する</button>
      </form>

      <p class="send-status" id="sendStatus"></p>
      <button class="secondary" id="retryBtn"disabled>もう一度する</button>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
